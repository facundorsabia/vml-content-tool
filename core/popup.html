<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>

<body>

  <!-- Header: VML Logo + App Name -->
  <div class="header">
    <img src="../assets/logo-vml.png" alt="VML" class="header-logo">
    <div class="header-info">
      <h1 class="header-title">VML Content Tool</h1>
      <p class="header-version">v2.0 - Internal Release</p>
    </div>
  </div>

  <!-- Main Content: Accordion layout -->
  <div class="main-content">

    <!-- Module 1: NBSP Detector -->
    <div class="accordion-item">
      <div class="accordion-header">
        <h2 class="module-title">1. NBSP Detector</h2>
        <span class="accordion-icon">&#9662;</span>
      </div>
      <div class="accordion-content">
        <div class="accordion-inner">
          <div class="field-group">
            <label class="field-label">Estado</label>
            <div class="status-row">
              <div class="status-display" id="statusDisplay">
                <span class="status-dot" id="statusDot"></span>
                <span class="status-text" id="statusLabel">APAGADO</span>
              </div>
              <label class="switch">
                <input type="checkbox" id="statusCheckbox">
                <span class="slider-toggle"></span>
              </label>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Module 2: AEM Quick Switcher -->
    <div class="accordion-item">
      <div class="accordion-header">
        <h2 class="module-title">2. AEM Quick Switcher</h2>
        <span class="accordion-icon">&#9662;</span>
      </div>
      <div class="accordion-content">
        <div class="accordion-inner">
          <div class="aem-controls" style="display: flex; flex-direction: column; gap: 10px;">
            <button id="btnAemEditor" class="btn-search">VAP ➔ EDITOR</button>
            <button id="btnAemAssets" class="btn-search">CF Editor ➔ Admin</button>
          </div>
          <p id="aemError" style="color: #ff4444; font-size: 12px; margin-top: 10px; display: none;"></p>
        </div>
      </div>
    </div>

    <!-- Module 3: Exact Disclosure Finder -->
    <div class="accordion-item">
      <div class="accordion-header">
        <h2 class="module-title">3. Exact Disclosure Finder</h2>
        <span class="accordion-icon">&#9662;</span>
      </div>
      <div class="accordion-content">
        <div class="accordion-inner">
          <textarea id="searchInput"
                    placeholder='Busca el disclouse - no lo encontrará si tiene palabras o frases extra.'
                    rows="3"></textarea>

          <div class="finder-controls">
            <button id="searchBtn" class="btn-search">BUSCAR</button>
            <div class="results-info">
              <span class="results-label">RESULTADOS:</span>
              <strong id="resultsCount" class="results-number">0</strong>
            </div>
          </div>

          <div class="finder-nav">
            <button id="prevMatch" class="btn-nav" title="Anterior">&#9650;</button>
            <button id="nextMatch" class="btn-nav" title="Siguiente">&#9660;</button>
            <span class="nav-page">Pág. <strong id="currentMatch">0</strong> / <strong id="totalMatches">0</strong></span>
          </div>
        </div>
      </div>
    </div>

    <!-- Module 4: Specs VDM Autofiller -->
    <div class="accordion-item">
      <div class="accordion-header">
        <h2 class="module-title">4. Specs VDM Autofiller</h2>
        <span class="accordion-icon">&#9662;</span>
      </div>
      <div class="accordion-content">
        <div class="accordion-inner">
          <textarea id="autofillInput"
                    placeholder="Pega las celdas desde Excel aquí..."
                    rows="5"></textarea>

          <div class="autofill-controls">
            <button id="btnAutofill" class="btn-search">AUTOCOMPLETAR TABLA</button>
          </div>

          <p id="autofillStatus" class="autofill-status" style="display: none;"></p>
        </div>
      </div>
    </div>

    <!-- Module 5: HTag Visualizer -->
    <div class="accordion-item">
      <div class="accordion-header">
        <h2 class="module-title">5. HTag Visualizer</h2>
        <span class="accordion-icon">&#9662;</span>
      </div>
      <div class="accordion-content">
        <div class="accordion-inner">
          <div class="field-group">
            <label class="field-label">Estado</label>
            <div class="status-row">
              <div class="status-display" id="htagStatusDisplay">
                <span class="status-dot" id="htagStatusDot"></span>
                <span class="status-text" id="htagStatusLabel">APAGADO</span>
              </div>
              <label class="switch">
                <input type="checkbox" id="htagStatusCheckbox">
                <span class="slider-toggle"></span>
              </label>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Module 6: Options VDM Autofiller -->
    <div class="accordion-item">
      <div class="accordion-header">
        <h2 class="module-title">6. Options VDM Autofiller</h2>
        <span class="accordion-icon">&#9662;</span>
      </div>
      <div class="accordion-content">
        <div class="accordion-inner">
          
          <textarea id="dropdownInput"  
                    class="input-field" 
                    placeholder="Pega las celdas desde Excel aquí..." 
                    rows="3"></textarea>
          
          <button id="btnApplyDropdown" class="btn-search" style="width: 100%;">APLICAR EN DROPDOWNS</button>
          
          <p id="dropdownStatus" class="autofill-status" style="display: none; margin-top: 10px;"></p>

        </div>
      </div>
    </div>

  </div>

  <!-- Footer: VML Branding -->
  <div class="footer">
    <img src="../assets/logo-vml.png" alt="VML" class="footer-logo">
    <div class="footer-info">
      <span class="footer-label">DESARROLLADO EN:</span>
      <strong class="footer-brand">VML ARGENTINA - ENGINEERING TEAM</strong>
    </div>
  </div>

  <!-- Modular scripts: each feature in its own file -->
  <script src="popup-ui.js"></script>
  <script src="../modules/nbsp-visualizer/popup-nbsp-visualizer.js"></script>
  <script src="../modules/disclouse-finder/popup-disclouse-finder.js"></script>
  <script src="../modules/aem-switcher/popup-aem.js"></script>
  <script src="../modules/vdm-specs-autofiller/popup-vdm-specs-autofiller.js"></script>
  <script src="../modules/htags-visualizer/popup-htags-visualizer.js"></script>
  <script src="../modules/vdm-options-autofiller/popup-vdm-options-autofiller.js"></script>
</body>

</html>
